<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduFlow LMS - Предметы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-protected-page="true">
  <nav class="navbar navbar-light bg-white border-bottom shadow-sm sticky-top app-navbar">
    <div class="container-fluid px-3 px-lg-4">
      <a class="navbar-brand d-flex align-items-center gap-3 me-4" href="/profile">
        <span class="brand-mark">EF</span>
        <span class="brand-copy">
          <span class="brand-kicker">Learning Platform</span>
          <span class="brand-title">EduFlow LMS</span>
        </span>
      </a>
      <div class="d-flex align-items-center gap-2 gap-lg-3 ms-auto topbar-meta">
        <div class="topbar-time d-none d-md-grid">
          <span>Время сервера</span>
          <strong>31.03.2026 | 09:08</strong>
        </div>
        <button class="btn btn-outline-secondary btn-sm" type="button" data-logout-button>Выйти</button>
        <div class="topbar-avatar" data-user-avatar>NG</div>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-4 app-page">
    <div class="row g-4">
      <aside class="col-12 col-xl-3">
        <div class="d-grid gap-4 sidebar-stack">
          <section class="card shadow-sm border-0">
            <div class="card-body">
              <p class="section-label mb-3">Навигация</p>
              <nav class="main-nav">
                <a href="/profile" class="nav-link">Профиль</a>
                <a href="/assignments" class="nav-link active">Предметы</a>
                <a href="/directory" class="nav-link">Пользователи</a>
                <a href="/messenger" class="nav-link">Мессенджер</a>
                <a href="/admin" class="nav-link" data-admin-only="true">Админ-панель</a>
                <a href="/schedule" class="nav-link">Расписание</a>
                <a href="/admin/moderation" class="nav-link" data-admin-only="true">Модерация</a>
                <a href="/admin/settings" class="nav-link" data-admin-only="true">Настройки</a>
              </nav>
            </div>
          </section>
        </div>
      </aside>

      <main class="col-12 col-xl-9">
        <section class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <div class="panel-header">
              <div>
                <p class="section-label mb-1" id="assignmentSectionLabel">Subjects</p>
                <h1 class="h3 mb-0 hero-title" id="assignmentPageTitle">Предметы</h1>
              </div>
              <div class="assignment-actions">
                <button type="button" class="primary-button" id="showAssignmentFormButton" data-teacher-only="true">Создать задание</button>
                <span class="badge text-bg-light rounded-pill" id="assignmentsCountBadge">0 предметов</span>
              </div>
            </div>
            <div id="assignmentDeadlineNotifications" class="mt-3" hidden></div>
            <section class="assignment-teacher-panel mt-4" id="teacherAssignmentPanel" data-teacher-only="true">
              <div class="assignment-teacher-header">
                <div>
                  <p class="section-label mb-1">Teacher Tools</p>
                  <h2 class="h5 mb-0">Добавить новое задание</h2>
                </div>
              </div>

              <form id="assignmentCreateForm" class="row g-3 mt-1">
                <div class="col-12 col-lg-6">
                  <input
                    id="assignmentTitle"
                    name="title"
                    class="form-control"
                    type="text"
                    placeholder="Название задания"
                    aria-label="Название задания"
                    required
                  >
                </div>
                <div class="col-12 col-lg-6">
                  <input
                    id="assignmentDeadline"
                    name="deadline"
                    class="form-control"
                    type="date"
                    placeholder="Дедлайн"
                    aria-label="Дедлайн"
                    required
                  >
                </div>
                <div class="col-12 col-lg-6">
                  <input
                    id="assignmentMaxScore"
                    name="max_score"
                    class="form-control"
                    type="number"
                    min="1"
                    max="50"
                    value="5"
                    placeholder="Максимальный балл (1-50)"
                    aria-label="Максимальный балл"
                    required
                  >
                </div>
                <div class="col-12">
                  <input
                    id="assignmentMaterialFile"
                    name="file"
                    class="form-control"
                    type="file"
                    accept=".txt,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.png,.jpg,.jpeg,.gif,.webp,.bmp,.tif,.tiff,.zip,.rar,.7z,.tar,.gz"
                    title="Поддерживаются: TXT, DOC, DOCX, XLS, XLSX, PPT, PPTX, PNG, JPG, JPEG, GIF, WEBP, BMP, TIF, TIFF, ZIP, RAR, 7Z, TAR, GZ"
                    aria-label="Файл задания"
                    required
                  >
                </div>
                <div class="col-12">
                  <textarea
                    id="assignmentDescription"
                    name="description"
                    class="form-control"
                    rows="4"
                    placeholder="Описание задания"
                    aria-label="Описание задания"
                  ></textarea>
                </div>
                <div class="col-12">
                  <button type="submit" class="primary-button">Опубликовать задание</button>
                </div>
              </form>
            </section>

            <div class="assignment-list mt-4" id="assignmentList"></div>
            <div class="assignment-empty-state mt-4" id="assignmentEmptyState" hidden>Пока заданий нет.</div>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="/site.js"></script>
</body>
</html>
