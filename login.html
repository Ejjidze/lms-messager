<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduFlow LMS - Авторизация</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page" data-auth-page="true">
  <main class="login-shell">
    <section class="login-card shadow-lg">
      <div class="login-brand">
        <span class="brand-mark">EF</span>
        <div class="brand-copy">
          <span class="brand-kicker">Learning Platform</span>
          <span class="brand-title">EduFlow LMS</span>
        </div>
      </div>

      <div class="login-copy">
        <p class="section-label mb-2">Авторизация</p>
        <h1 class="login-title">Вход в систему</h1>
        <p class="login-subtitle">
          Используй одну из demo-ролей, чтобы войти в систему и открыть нужный интерфейс LMS.
        </p>
      </div>

      <form id="loginForm" class="login-form">
        <div>
          <label class="form-label" for="loginUsername">Логин</label>
          <input id="loginUsername" name="username" class="form-control form-control-lg" type="text" autocomplete="username" required>
        </div>
        <div>
          <label class="form-label" for="loginPassword">Пароль</label>
          <input id="loginPassword" name="password" class="form-control form-control-lg" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100">Войти</button>
        <p id="loginError" class="login-error" hidden>Неверный логин или пароль.</p>
      </form>

    </section>
  </main>

  <script src="/site.js"></script>
</body>
</html>
