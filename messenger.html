<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduFlow LMS - Мессенджер</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-protected-page="true" class="messenger-page">
  <nav class="navbar navbar-light bg-white border-bottom shadow-sm sticky-top app-navbar">
    <div class="container-fluid px-3 px-lg-4">
      <a class="navbar-brand d-flex align-items-center gap-3 me-4" href="/profile">
        <span class="brand-mark">EF</span>
        <span class="brand-copy">
          <span class="brand-kicker">Learning Platform</span>
          <span class="brand-title">EduFlow LMS</span>
        </span>
      </a>
      <div class="d-flex align-items-center gap-2 gap-lg-3 ms-auto topbar-meta">
        <button class="btn btn-outline-secondary btn-sm" type="button" data-logout-button>Выйти</button>
        <div class="topbar-avatar" data-user-avatar>NG</div>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-4 app-page">
    <div class="row g-4">
      <aside class="col-12 col-xl-3">
        <div class="d-grid gap-4 sidebar-stack">
          <section class="card shadow-sm border-0">
            <div class="card-body">
              <p class="section-label mb-3">Навигация</p>
              <nav class="main-nav">
                <a href="/profile" class="nav-link">Профиль</a>
                <a href="/schedule" class="nav-link">Расписание</a>
                <a href="/assignments" class="nav-link">Задания</a>
                <a href="/directory" class="nav-link">Пользователи</a>
                <a href="/messenger" class="nav-link active">Мессенджер</a>
                <a href="/admin" class="nav-link" data-admin-only="true">Админ-панель</a>
              </nav>
            </div>
          </section>
        </div>
      </aside>

      <main class="col-12 col-xl-9 messenger-main">
        <section class="card border-0 shadow-sm messenger-panel">
          <div class="card-body p-4 messenger-panel-body">
            <div class="panel-header">
              <div>
                <p class="section-label mb-1">Integrated Messenger</p>
                <h1 class="h3 mb-0 hero-title">Мессенджер</h1>
              </div>
              <span class="badge text-bg-success rounded-pill">Live</span>
            </div>
            <div class="messenger-layout mt-4">
              <aside class="chat-list" id="chatList"></aside>
              <div class="chat-window">
                <div class="chat-window-header">
                  <div>
                    <h4 class="h5 mb-1" id="chatWindowTitle">Выберите чат</h4>
                    <p class="text-secondary mb-0" id="chatWindowMeta">Диалог отобразится здесь</p>
                  </div>
                </div>
                <div class="message-history" id="messageHistory">
                  <p class="submission-meta">Загрузка чатов...</p>
                </div>
                <form class="message-form" id="messageForm">
                  <input id="messageInput" class="form-control" type="text" placeholder="Введите сообщение" maxlength="2000">
                  <button type="submit" class="primary-button">Отправить</button>
                </form>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="/site.js"></script>
</body>
</html>
